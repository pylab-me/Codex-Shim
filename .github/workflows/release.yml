name: CI and Release

concurrency:
  group: release-ci
  cancel-in-progress: true

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. v0.1.10"
        required: false
        type: string
      binary_name:
        description: "Release binary name without .exe"
        required: true
        default: "codex-shim"
        type: string
      rust_toolchain:
        description: "Rust toolchain"
        required: true
        default: "stable"
        type: string

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  meta:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.meta.outputs.is_release }}
      release_version: ${{ steps.meta.outputs.release_version }}
      binary_name: ${{ steps.meta.outputs.binary_name }}
      rust_toolchain: ${{ steps.meta.outputs.rust_toolchain }}

    steps:
      - name: Resolve metadata
        id: meta
        run: |
          set -euo pipefail

          is_release=false
          release_version=""

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ inputs.version }}" ]; then
              is_release=true
              release_version="${{ inputs.version }}"
            fi
          elif [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            is_release=true
            release_version="${GITHUB_REF#refs/tags/}"
          fi

          echo "is_release=$is_release" >> "$GITHUB_OUTPUT"
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"
          echo "binary_name=${{ inputs.binary_name || 'codex-shim' }}" >> "$GITHUB_OUTPUT"
          echo "rust_toolchain=${{ inputs.rust_toolchain || 'stable' }}" >> "$GITHUB_OUTPUT"

  validate:
    name: Validate source
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --check

      - name: Build check
        run: cargo build --locked

  release:
    name: Build and package ${{ matrix.platform.label }}
    runs-on: ${{ matrix.platform.runner }}
    needs:
      - meta
      - validate
    if: needs.meta.outputs.is_release == 'true'
    environment: release

    strategy:
      fail-fast: false
      matrix:
        platform:
          - label: Windows x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: windows-x86_64
            archive_name: windows-x86_64.zip
            binary_suffix: .exe

          - label: Linux x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: linux-x86_64
            archive_name: linux-x86_64.tar.gz
            binary_suffix: ""

          - label: macOS arm64
            runner: macos-14
            target: aarch64-apple-darwin
            artifact_name: macos-arm64
            archive_name: macos-arm64.tar.gz
            binary_suffix: ""

          - label: macOS x86_64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            artifact_name: macos-x86_64
            archive_name: macos-x86_64.tar.gz
            binary_suffix: ""

    permissions:
      contents: write

    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ needs.meta.outputs.rust_toolchain }}
          targets: ${{ matrix.platform.target }}
          components: rustfmt

      - name: Verify Rust toolchain
        run: |
          set -euo pipefail

          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.cargo/bin:$PATH"

          echo "PATH=$PATH"
          echo "HOME=$HOME"

          which rustup || true
          which rustc || true
          which cargo || true

          rustup --version
          rustc --version
          cargo --version

          rustup target list --installed

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.platform.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.platform.target }}-cargo-
            ${{ runner.os }}-cargo-

      - name: Calculate release fingerprints
        run: |
          set -euo pipefail

          export PATH="$HOME/.cargo/bin:$PATH"

          sha256_file() {
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$1" | awk '{print tolower($1)}'
            elif command -v shasum >/dev/null 2>&1; then
              shasum -a 256 "$1" | awk '{print tolower($1)}'
            elif command -v certutil >/dev/null 2>&1; then
              certutil -hashfile "$1" SHA256 | awk 'NF == 1 && $1 ~ /^[0-9A-Fa-f]{64}$/ {print tolower($1); exit}'
            else
              echo "No SHA256 tool found" >&2
              exit 1
            fi
          }

          find_python() {
            if command -v python3 >/dev/null 2>&1; then
              echo "python3"
            elif command -v python >/dev/null 2>&1; then
              echo "python"
            else
              echo "No Python executable found" >&2
              exit 1
            fi
          }

          lock_hash="$(sha256_file ./Cargo.lock)"
          workflow_hash="$(sha256_file ./.github/workflows/release.yml)"
          build_rs_hash="$(sha256_file ./build.rs)"
          python_cmd="$(find_python)"

          {
            echo "BUILD_CARGO_LOCK_SHA256=$lock_hash"
            echo "BUILD_CI_WORKFLOW_SHA256=$workflow_hash"
            echo "BUILD_PUBLIC_BUILD_RS_SHA256=$build_rs_hash"
            echo "BUILD_SOURCE_REF=${GITHUB_SHA}"
            echo "BUILD_SOURCE_REPOSITORY=${{ github.repository }}"
            echo "BUILD_RELEASE_VERSION=${{ needs.meta.outputs.release_version }}"
            echo "BUILD_RELEASE_TARGET=${{ matrix.platform.target }}"
          } >> "$GITHUB_ENV"

          printf '%s\n' "$lock_hash" > ./Cargo.lock.sha256
          printf '%s\n' "$workflow_hash" > ./release.yml.sha256
          printf '%s\n' "$build_rs_hash" > ./build.rs.sha256

          BUILD_METADATA_NAME="${{ needs.meta.outputs.binary_name }}" \
          BUILD_METADATA_VERSION="${{ needs.meta.outputs.release_version }}" \
          BUILD_METADATA_SOURCE_REPOSITORY="${{ github.repository }}" \
          BUILD_METADATA_SOURCE_REF="${GITHUB_SHA}" \
          BUILD_METADATA_TARGET="${{ matrix.platform.target }}" \
          BUILD_METADATA_RUST_TOOLCHAIN="${{ needs.meta.outputs.rust_toolchain }}" \
          BUILD_METADATA_CARGO_LOCK_SHA256="$lock_hash" \
          BUILD_METADATA_RELEASE_WORKFLOW_SHA256="$workflow_hash" \
          BUILD_METADATA_PUBLIC_BUILD_RS_SHA256="$build_rs_hash" \
          BUILD_METADATA_RUNNER="${{ matrix.platform.runner }}" \
          BUILD_METADATA_GITHUB_REPOSITORY="${{ github.repository }}" \
          BUILD_METADATA_GITHUB_RUN_ID="${{ github.run_id }}" \
          BUILD_METADATA_GITHUB_RUN_ATTEMPT="${{ github.run_attempt }}" \
          BUILD_METADATA_GITHUB_ACTOR="${{ github.actor }}" \
          "$python_cmd" - <<'PY'
          import json
          import os

          metadata = {
              "name": os.environ["BUILD_METADATA_NAME"],
              "version": os.environ["BUILD_METADATA_VERSION"],
              "source_visibility": "public",
              "source_repository": os.environ["BUILD_METADATA_SOURCE_REPOSITORY"],
              "source_ref": os.environ["BUILD_METADATA_SOURCE_REF"],
              "target": os.environ["BUILD_METADATA_TARGET"],
              "profile": "release",
              "rust_toolchain": os.environ["BUILD_METADATA_RUST_TOOLCHAIN"],
              "cargo_lock_sha256": os.environ["BUILD_METADATA_CARGO_LOCK_SHA256"],
              "release_workflow_sha256": os.environ["BUILD_METADATA_RELEASE_WORKFLOW_SHA256"],
              "public_build_rs_sha256": os.environ["BUILD_METADATA_PUBLIC_BUILD_RS_SHA256"],
              "built_by": "github-actions",
              "runner": os.environ["BUILD_METADATA_RUNNER"],
              "github_repository": os.environ["BUILD_METADATA_GITHUB_REPOSITORY"],
              "github_run_id": os.environ["BUILD_METADATA_GITHUB_RUN_ID"],
              "github_run_attempt": os.environ["BUILD_METADATA_GITHUB_RUN_ATTEMPT"],
              "github_actor": os.environ["BUILD_METADATA_GITHUB_ACTOR"],
          }

          with open("build-info.json", "w", encoding="utf-8") as f:
              json.dump(metadata, f, ensure_ascii=False, indent=2)
              f.write("\n")
          PY

      - name: Format check
        run: |
          set -euo pipefail
          export PATH="$HOME/.cargo/bin:$PATH"

          cargo "+${{ needs.meta.outputs.rust_toolchain }}" fmt --check

      - name: Build release
        run: |
          set -euo pipefail
          export PATH="$HOME/.cargo/bin:$PATH"

          cargo "+${{ needs.meta.outputs.rust_toolchain }}" build --release --locked --target "${{ matrix.platform.target }}"

      - name: Package release assets
        run: |
          set -euo pipefail

          export PATH="$HOME/.cargo/bin:$PATH"

          sha256_file() {
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$1" | awk '{print tolower($1)}'
            elif command -v shasum >/dev/null 2>&1; then
              shasum -a 256 "$1" | awk '{print tolower($1)}'
            elif command -v certutil >/dev/null 2>&1; then
              certutil -hashfile "$1" SHA256 | awk 'NF == 1 && $1 ~ /^[0-9A-Fa-f]{64}$/ {print tolower($1); exit}'
            else
              echo "No SHA256 tool found" >&2
              exit 1
            fi
          }

          find_python() {
            if command -v python3 >/dev/null 2>&1; then
              echo "python3"
            elif command -v python >/dev/null 2>&1; then
              echo "python"
            else
              echo "No Python executable found" >&2
              exit 1
            fi
          }

          binary="${{ needs.meta.outputs.binary_name }}${{ matrix.platform.binary_suffix }}"
          archive_name="${{ needs.meta.outputs.binary_name }}-${{ needs.meta.outputs.release_version }}-${{ matrix.platform.archive_name }}"
          build_info_asset_name="build-info-${{ matrix.platform.artifact_name }}.json"
          python_cmd="$(find_python)"

          rm -rf dist
          mkdir -p dist

          cp "./target/${{ matrix.platform.target }}/release/${binary}" "./dist/${binary}"
          cp ./build-info.json ./dist/build-info.json
          cp -f ./Cargo.lock ./dist/Cargo.lock
          cp -f ./Cargo.lock.sha256 ./dist/Cargo.lock.sha256

          if [ -f ./config/config.example.yaml ]; then
            cp ./config/config.example.yaml ./dist/config.example.yaml
          fi

          if [ -f ./config/config.example.json ]; then
            cp ./config/config.example.json ./dist/config.example.json
          fi

          if [ -f ./config/codex-cli/codex-cli.example.config.toml ]; then
            cp ./config/codex-cli/codex-cli.example.config.toml ./dist/codex-cli.example.config.toml
          fi

          if [ -f ./config/codex-cli/mimo.json ]; then
            cp ./config/codex-cli/mimo.json ./dist/mimo.json
          fi

          if [ -f ./config/codex-cli/README.md ]; then
            cp ./config/codex-cli/README.md ./dist/CODEX-CONFIG-README.md
          fi

          cp ./README.md ./dist/README.txt
          cp ./VERIFY.md ./dist/VERIFY.txt
          cp ./SECURITY.md ./dist/SECURITY.txt
          cp ./LICENSE.txt ./dist/LICENSE.txt

          rm -f "$archive_name"

          case "$archive_name" in
            *.zip)
              "$python_cmd" - "$archive_name" <<'PY'
          import pathlib
          import sys
          import zipfile

          archive_name = sys.argv[1]
          dist = pathlib.Path("dist")

          with zipfile.ZipFile(archive_name, "w", compression=zipfile.ZIP_DEFLATED) as zf:
              for path in sorted(dist.rglob("*")):
                  if path.is_file():
                      zf.write(path, path.relative_to(dist).as_posix())
          PY
              ;;
            *.tar.gz)
              tar -C dist -czf "$archive_name" .
              ;;
            *)
              echo "Unsupported archive format: $archive_name" >&2
              exit 1
              ;;
          esac

          cp ./build-info.json "./${build_info_asset_name}"
          printf '%s  %s\n' "$(sha256_file "$archive_name")" "$archive_name" > ./sha256sums.txt

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.platform.artifact_name }}
          path: |
            ${{ needs.meta.outputs.binary_name }}-${{ needs.meta.outputs.release_version }}-${{ matrix.platform.archive_name }}
            sha256sums.txt
            build-info-${{ matrix.platform.artifact_name }}.json
            Cargo.lock
            Cargo.lock.sha256
            build.rs.sha256
            release.yml.sha256

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - meta
      - release
    if: needs.meta.outputs.is_release == 'true'

    permissions:
      contents: write

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Merge checksum manifests
        run: |
          set -euo pipefail
          find artifacts -name sha256sums.txt -print0 | sort -z | xargs -0 cat > sha256sums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.meta.outputs.release_version }}
          name: ${{ needs.meta.outputs.binary_name }} ${{ needs.meta.outputs.release_version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/release-windows-x86_64/${{ needs.meta.outputs.binary_name }}-${{ needs.meta.outputs.release_version }}-windows-x86_64.zip
            artifacts/release-linux-x86_64/${{ needs.meta.outputs.binary_name }}-${{ needs.meta.outputs.release_version }}-linux-x86_64.tar.gz
            artifacts/release-macos-arm64/${{ needs.meta.outputs.binary_name }}-${{ needs.meta.outputs.release_version }}-macos-arm64.tar.gz
            artifacts/release-macos-x86_64/${{ needs.meta.outputs.binary_name }}-${{ needs.meta.outputs.release_version }}-macos-x86_64.tar.gz
            sha256sums.txt
            artifacts/release-windows-x86_64/build-info-windows-x86_64.json
            artifacts/release-linux-x86_64/build-info-linux-x86_64.json
            artifacts/release-macos-arm64/build-info-macos-arm64.json
            artifacts/release-macos-x86_64/build-info-macos-x86_64.json
            artifacts/release-windows-x86_64/Cargo.lock
            artifacts/release-windows-x86_64/Cargo.lock.sha256
            build.rs
            artifacts/release-windows-x86_64/build.rs.sha256
            .github/workflows/release.yml
            artifacts/release-windows-x86_64/release.yml.sha256
