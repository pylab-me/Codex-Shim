name: CI and Release

concurrency:
  group: release-ci
  cancel-in-progress: true

on:
  pull_request:
  push:
    branches:
      - feat/preview-ui
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build-and-package:
    name: Build & package ${{ matrix.platform.label }}
    runs-on: ${{ matrix.platform.runner }}
    environment: release

    strategy:
      fail-fast: false
      matrix:
        platform:
          - label: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary_suffix: .exe
          - label: linux-x86_64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_suffix: ""
          - label: macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            binary_suffix: ""
          - label: macos-x86_64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            binary_suffix: ""

    permissions:
      contents: write

    env:
      BINARY_NAME: codex-shim-ui
      RUST_TOOLCHAIN: stable
      CARGO_TERM_COLOR: always
      CODEX_SHIM_MASTER_SEED: ${{ secrets.CODEX_SHIM_MASTER_SEED }}

    steps:
      # ---------------------------------------------------------
      # Checkout
      # ---------------------------------------------------------
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Configure Git Token
        run: |
          git config --global url."https://x-access-token:${{ secrets.PERSONAL_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"
          echo "CARGO_NET_GIT_FETCH_WITH_CLI=true" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      # ---------------------------------------------------------
      # Linux system deps (GTK/WebKit for Tauri)
      # ---------------------------------------------------------
      - name: Install Linux system dependencies
        if: ${{ matrix.platform.label == 'linux-x86_64' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
           pkg-config build-essential \
           libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
           libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libxdo-dev libssl-dev
      # ---------------------------------------------------------
      # Rust toolchain
      # ---------------------------------------------------------
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.platform.target }}
          components: rustfmt

      # ---------------------------------------------------------
      # Cargo cache
      # ---------------------------------------------------------
      - name: Compute Cargo cache key
        id: cargo-cache-key
        run: |
          set -euo pipefail
          
          python3 <<'PY' > cargo-cache-input.json
          import json
          import pathlib
          import tomllib
          
          files = sorted(pathlib.Path(".").glob("**/Cargo.toml"))
          
          result = {}
          
          for path in files:
              # 排除 target/node_modules 等目录，避免误扫
              parts = set(path.parts)
              if "target" in parts or "node_modules" in parts:
                  continue
          
              with path.open("rb") as f:
                  data = tomllib.load(f)
          
              # 只移除包自身版本，不移除依赖版本
              if isinstance(data.get("package"), dict):
                  data["package"].pop("version", None)
          
              if isinstance(data.get("workspace"), dict):
                  workspace = data["workspace"]
                  if isinstance(workspace.get("package"), dict):
                      workspace["package"].pop("version", None)
          
              result[str(path)] = data
          
          print(json.dumps(result, sort_keys=True, separators=(",", ":")))
          PY
          
          HASH="$(python3 - <<'PY'
          import hashlib
          from pathlib import Path
          
          print(hashlib.sha256(Path("cargo-cache-input.json").read_bytes()).hexdigest())
          PY
          )"
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
            src-tauri/target/
          key: ${{ runner.os }}-${{ matrix.platform.target }}-cargo-${{ steps.cargo-cache-key.outputs.hash }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.platform.target }}-cargo-
            ${{ runner.os }}-cargo-

      # ---------------------------------------------------------
      # Node.js (for frontend build triggered by tauri)
      # ---------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache-dependency-path: frontend/package.json
          node-version: 24
          cache: npm

      - name: Build frontend
        run: |
          cd frontend
          npm i

      # ---------------------------------------------------------
      # Build Tauri app (no bundle)
      #   Output: src-tauri/target/{target}/release/codex-shim{,.exe}
      # ---------------------------------------------------------
      - name: Build with Tauri (no bundle)
        run: |
          set -euo pipefail
          cargo install tauri-cli --version "^2.0.0" --locked
          cargo tauri build --target "${{ matrix.platform.target }}" --no-bundle

      # ---------------------------------------------------------
      # Prepare packaging directory
      # ---------------------------------------------------------
      - name: Prepare packaging directory
        id: prep
        run: |
          set -euo pipefail
          BINARY="${{ env.BINARY_NAME }}${{ matrix.platform.binary_suffix }}"
          BUILD_DIR="dist"

          rm -rf "$BUILD_DIR"
          mkdir -p "$BUILD_DIR"

          # Copy Tauri binary
          cp "./src-tauri/target/${{ matrix.platform.target }}/release/${BINARY}" "$BUILD_DIR/"

          # Copy config directory
          if [ -d "./config" ]; then
            cp -r ./config "$BUILD_DIR/"
          fi

          # Copy documentation
          for f in README.md VERIFY.md SECURITY.md LICENSE.txt; do
            [ -f "./$f" ] && cp "./$f" "$BUILD_DIR/${f%.md}.txt"
          done

          # Version: tag name if tag push, else short SHA
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="${GITHUB_SHA::7}"
          fi

          ARCHIVE="${{ env.BINARY_NAME }}-${VERSION}-${{ matrix.platform.label }}.${{ matrix.platform.archive_ext }}"

          echo "binary=${BINARY}"             >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}"          >> "$GITHUB_OUTPUT"
          echo "archive=${ARCHIVE}"          >> "$GITHUB_OUTPUT"
          echo "build_dir=${BUILD_DIR}"      >> "$GITHUB_OUTPUT"

      # ---------------------------------------------------------
      # Create archive
      # ---------------------------------------------------------
      - name: Create archive
        run: |
          set -euo pipefail
          ARCHIVE="${{ steps.prep.outputs.archive }}"
          BUILD_DIR="${{ steps.prep.outputs.build_dir }}"

          if [[ "$ARCHIVE" == *.zip ]]; then
            7z a -tzip -mx=9 "$ARCHIVE" "$BUILD_DIR/*"
          else
            tar -C "$BUILD_DIR" -czf "$ARCHIVE" .
          fi

      # ---------------------------------------------------------
      # SHA256 checksum
      # ---------------------------------------------------------
      - name: Generate checksum
        run: |
          set -euo pipefail
          ARCHIVE="${{ steps.prep.outputs.archive }}"
          
          python3 <<PY > sha256sums.txt
          import hashlib
          from pathlib import Path
          
          archive = Path("${ARCHIVE}")
          digest = hashlib.sha256(archive.read_bytes()).hexdigest()
          print(f"{digest}  {archive.name}")
          PY

      # ---------------------------------------------------------
      # Upload artifact
      # ---------------------------------------------------------
      - name: Upload packaged artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.platform.label }}
          path: |
            ${{ steps.prep.outputs.archive }}
            sha256sums.txt

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-package
    permissions:
      contents: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Merge checksum manifests
        run: |
          set -euo pipefail
          find artifacts -name sha256sums.txt -print0 | sort -z | xargs -0 cat > sha256sums.txt

      - name: Compute release metadata
        id: release-meta
        run: |
          set -euo pipefail
          
          DATE="$(date -u +%Y-%m-%d)"
          
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="preview-ui-${DATE}-${GITHUB_RUN_NUMBER}"
          fi
          
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name=Preview UI: ${DATE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release-meta.outputs.tag }}
          name: ${{ steps.release-meta.outputs.name }}
          draft: false
          prerelease: true
          generate_release_notes: true
          files: |
            artifacts/release-windows-x86_64/codex-shim-ui-*-windows-x86_64.zip
            artifacts/release-linux-x86_64/codex-shim-ui-*-linux-x86_64.tar.gz
            artifacts/release-macos-arm64/codex-shim-ui-*-macos-arm64.tar.gz
            artifacts/release-macos-x86_64/codex-shim-ui-*-macos-x86_64.tar.gz
            sha256sums.txt